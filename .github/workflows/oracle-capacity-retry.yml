name: Oracle capacity retry

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: oracle-capacity-retry
  cancel-in-progress: false

jobs:
  retry-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_PRIVATE_KEY_B64: ${{ secrets.OCI_PRIVATE_KEY_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Ensure OpenSSL is available
        run: |
          sudo apt-get update
          sudo apt-get install -y openssl

      - name: Create OCI private key file from base64
        shell: bash
        run: |
          mkdir -p ~/.oci
          echo "$OCI_PRIVATE_KEY_B64" | base64 -d > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Verify private key matches fingerprint
        shell: bash
        run: |
          DERIVED_FP=$(openssl rsa -pubout -outform DER -in ~/.oci/oci_api_key.pem 2>/dev/null | openssl md5 -c | awk '{print $2}')
          if [ "$DERIVED_FP" != "$OCI_FINGERPRINT" ]; then
            echo "Fingerprint mismatch between OCI_PRIVATE_KEY_B64 and OCI_FINGERPRINT"
            echo "Derived: $DERIVED_FP"
            exit 1
          fi
          echo "Fingerprint matches private key."

      - name: Create backend config
        shell: bash
        run: |
          cat > backend.hcl <<EOF
          bucket           = "tf-state"
          namespace        = "axz5kerlx4p6"
          key              = "oracle-capacity/instance.tfstate"
          tenancy_ocid     = "${OCI_TENANCY_OCID}"
          user_ocid        = "${OCI_USER_OCID}"
          fingerprint      = "${OCI_FINGERPRINT}"
          private_key_path = "/home/runner/.oci/oci_api_key.pem"
          region           = "${OCI_REGION}"
          auth             = "APIKey"
          EOF
          chmod 600 backend.hcl

      - name: Terraform Init
        run: terraform init -input=false -reconfigure -backend-config=backend.hcl

      - name: Terraform Apply
        shell: bash
        run: |
          set +e
          terraform apply -auto-approve -input=false 2>&1 | tee apply.log
          code=${PIPESTATUS[0]}

          if [ $code -eq 0 ]; then
            echo "Terraform apply succeeded."
            exit 0
          fi

          if grep -q "Out of host capacity" apply.log; then
            echo "Still out of capacity. Next scheduled run will retry."
            exit 0
          fi

          exit $code
