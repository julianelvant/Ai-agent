name: Oracle capacity retry

on:
  workflow_dispatch:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

concurrency:
  group: oracle-capacity-retry
  cancel-in-progress: false

jobs:
  retry-launch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCI CLI and tools
        id: install
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli
          sudo apt-get update
          sudo apt-get install -y openssl curl jq

      - name: Restore working OCI config and key
        id: restore
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.oci

          echo '${{ secrets.OCI_PRIVATE_KEY_B64 }}' | base64 -d > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          echo '${{ secrets.OCI_CONFIG_B64 }}' | base64 -d > ~/.oci/config
          sed -i 's|^key_file=.*|key_file=/home/runner/.oci/oci_api_key.pem|' ~/.oci/config
          chmod 600 ~/.oci/config

          echo "OCI_CLI_CONFIG_FILE=/home/runner/.oci/config" >> "$GITHUB_ENV"

      - name: Verify key matches fingerprint from config
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_FP="$(awk -F= '/^fingerprint=/{print $2}' ~/.oci/config | tr -d '\r\n[:space:]')"
          DERIVED_FP="$(openssl rsa -pubout -outform DER -in ~/.oci/oci_api_key.pem 2>/dev/null | openssl md5 -c | awk '{print $2}')"

          if [ "$DERIVED_FP" != "$CONFIG_FP" ]; then
            echo "Fingerprint mismatch."
            echo "Derived: $DERIVED_FP"
            echo "Config: $CONFIG_FP"
            exit 1
          fi

          echo "Fingerprint matches key."

      - name: Verify OCI auth works
        id: auth
        shell: bash
        run: |
          set -euo pipefail
          oci os ns get
          oci os bucket get -ns axz5kerlx4p6 -bn tf-state

      - name: Check if instance already exists
        id: exists
        shell: bash
        run: |
          set -euo pipefail

          COMPARTMENT_ID="$(awk -F= '/^tenancy=/{print $2}' ~/.oci/config | tr -d '\r\n[:space:]')"

          EXISTING_ID="$(oci compute instance list \
            --compartment-id "$COMPARTMENT_ID" \
            --availability-domain "cHOj:ME-DUBAI-1-AD-1" \
            --display-name "instance-20260309-0046" \
            --all \
            --query "data[?\"lifecycle-state\"!='TERMINATED'].id | [0]" \
            --raw-output)"

          if [ "$EXISTING_ID" = "null" ] || [ -z "$EXISTING_ID" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "instance_id=" >> "$GITHUB_OUTPUT"
            echo "No existing instance found."
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "instance_id=$EXISTING_ID" >> "$GITHUB_OUTPUT"
            echo "Existing instance found: $EXISTING_ID"
          fi

      - name: Launch instance
        id: launch
        if: steps.exists.outputs.exists == 'false'
        shell: bash
        run: |
          set +e

          COMPARTMENT_ID="$(awk -F= '/^tenancy=/{print $2}' ~/.oci/config | tr -d '\r\n[:space:]')"

          oci compute instance launch \
            --availability-domain "cHOj:ME-DUBAI-1-AD-1" \
            --compartment-id "$COMPARTMENT_ID" \
            --subnet-id "ocid1.subnet.oc1.me-dubai-1.aaaaaaaav6dpwb2wgxvjctydrzbo46jspe6hxc5nnvuxcfal63uu2dgmznda" \
            --display-name "instance-20260309-0046" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 2, "memoryInGBs": 12}' \
            --image-id "ocid1.image.oc1.me-dubai-1.aaaaaaaab352mbi4vcyymzs4ccln576k34khc357fk2hlaqx3cuzjclgkoea" \
            --assign-public-ip true \
            --assign-private-dns-record true \
            --availability-config '{"recoveryAction":"RESTORE_INSTANCE"}' \
            --instance-options '{"areLegacyImdsEndpointsDisabled": false}' \
            --metadata '{"ssh_authorized_keys":"ssh-rsa  ssh-key-2026-03-08"}' \
            2>&1 | tee launch.log

          code=${PIPESTATUS[0]}

          if [ $code -eq 0 ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "Instance launch request succeeded."
            exit 0
          fi

          if grep -qi "Out of host capacity" launch.log || grep -qi "out of capacity" launch.log; then
            echo "result=capacity" >> "$GITHUB_OUTPUT"
            echo "Still out of capacity. Next scheduled run will retry."
            exit 0
          fi

          echo "result=error" >> "$GITHUB_OUTPUT"
          echo "Unexpected launch error."
          exit $code

      - name: Send Telegram notification
        if: always()
        shell: bash
        run: |
          set +e

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TRIGGER="${{ github.event_name }}"
          WHEN_UTC="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          if [ "${{ steps.restore.outcome }}" = "failure" ]; then
            STATUS="❌ Failed to restore OCI config/key."
          elif [ "${{ steps.fingerprint.outcome }}" = "failure" ]; then
            STATUS="❌ Fingerprint mismatch or bad OCI key/config."
          elif [ "${{ steps.auth.outcome }}" = "failure" ]; then
            STATUS="❌ OCI auth failed."
          elif [ "${{ steps.exists.outcome }}" = "failure" ]; then
            STATUS="❌ Failed while checking whether the instance already exists."
          elif [ "${{ steps.exists.outputs.exists }}" = "true" ]; then
            STATUS="✅ Instance already exists: ${{ steps.exists.outputs.instance_id }}"
          elif [ "${{ steps.launch.outputs.result }}" = "success" ]; then
            STATUS="✅ Instance launch request succeeded."
          elif [ "${{ steps.launch.outputs.result }}" = "capacity" ]; then
            STATUS="🟡 Out of host capacity. Next scheduled run will retry."
          elif [ "${{ steps.launch.outcome }}" = "failure" ]; then
            STATUS="❌ Unexpected OCI launch error."
          else
            STATUS="ℹ️ Workflow finished, but no launch status was captured."
          fi

          MSG="<b>Oracle Capacity Retry</b>%0A"
          MSG="${MSG}<b>Status:</b> ${STATUS}%0A"
          MSG="${MSG}<b>Instance:</b> instance-20260309-0046%0A"
          MSG="${MSG}<b>Region:</b> me-dubai-1%0A"
          MSG="${MSG}<b>Trigger:</b> ${TRIGGER}%0A"
          MSG="${MSG}<b>Run:</b> #${GITHUB_RUN_NUMBER}%0A"
          MSG="${MSG}<b>Time:</b> ${WHEN_UTC}%0A"
          MSG="${MSG}<b>Repo:</b> ${GITHUB_REPOSITORY}%0A"
          MSG="${MSG}<b>Logs:</b> ${RUN_URL}"

          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data "text=${MSG}" \
            --data "parse_mode=HTML" \
            --data "disable_web_page_preview=true" \
            > /tmp/tg_response.json || true

          echo "Telegram notification attempted."
          cat /tmp/tg_response.json || true
