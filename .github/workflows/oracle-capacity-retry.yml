name: Oracle capacity retry

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: oracle-capacity-retry
  cancel-in-progress: false

jobs:
  retry-launch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCI CLI
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli

      - name: Create OCI config from secrets
        shell: bash
        run: |
          mkdir -p ~/.oci

          echo '${{ secrets.OCI_PRIVATE_KEY_B64 }}' | base64 -d > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          USER_OCID="$(printf '%s' '${{ secrets.OCI_USER_OCID }}' | tr -d '\r\n')"
          TENANCY_OCID="$(printf '%s' '${{ secrets.OCI_TENANCY_OCID }}' | tr -d '\r\n')"
          FINGERPRINT="$(printf '%s' '${{ secrets.OCI_FINGERPRINT }}' | tr -d '\r\n')"
          REGION="$(printf '%s' '${{ secrets.OCI_REGION }}' | tr -d '\r\n')"

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${USER_OCID}
          fingerprint=${FINGERPRINT}
          tenancy=${TENANCY_OCID}
          region=${REGION}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

          chmod 600 ~/.oci/config

      - name: Verify OCI auth works
        run: |
          oci os ns get
          oci os bucket get -ns axz5kerlx4p6 -bn tf-state

      - name: Check if instance already exists
        id: exists
        shell: bash
        run: |
          EXISTING_ID=$(
            oci compute instance list \
              --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
              --availability-domain "cHOj:ME-DUBAI-1-AD-1" \
              --display-name "instance-20260309-0046" \
              --all --output json | \
            python3 -c "import sys, json; d=json.load(sys.stdin).get('data', []); print(next((x['id'] for x in d if x.get('lifecycle-state') != 'TERMINATED'), ''))"
          )

          if [ -n "$EXISTING_ID" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Existing instance found: $EXISTING_ID"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing instance found."
          fi

      - name: Launch instance
        if: steps.exists.outputs.exists == 'false'
        shell: bash
        run: |
          set +e

          oci compute instance launch \
            --availability-domain "cHOj:ME-DUBAI-1-AD-1" \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --subnet-id "ocid1.subnet.oc1.me-dubai-1.aaaaaaaav6dpwb2wgxvjctydrzbo46jspe6hxc5nnvuxcfal63uu2dgmznda" \
            --display-name "instance-20260309-0046" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 2, "memoryInGBs": 12}' \
            --image-id "ocid1.image.oc1.me-dubai-1.aaaaaaaab352mbi4vcyymzs4ccln576k34khc357fk2hlaqx3cuzjclgkoea" \
            --assign-public-ip true \
            --assign-private-dns-record true \
            --availability-config '{"recoveryAction":"RESTORE_INSTANCE"}' \
            --instance-options '{"areLegacyImdsEndpointsDisabled": false}' \
            --metadata '{"ssh_authorized_keys":"ssh-rsa  ssh-key-2026-03-08"}' \
            2>&1 | tee launch.log

          code=${PIPESTATUS[0]}

          if [ $code -eq 0 ]; then
            echo "Instance launch request succeeded."
            exit 0
          fi

          if grep -q "Out of host capacity" launch.log; then
            echo "Still out of capacity. Next scheduled run will retry."
            exit 0
          fi

          exit $code
