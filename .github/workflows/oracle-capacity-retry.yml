name: Oracle capacity retry

on:
  workflow_dispatch:
  schedule:
    - cron: "2 */5 * * *"

concurrency:
  group: oracle-capacity-retry
  cancel-in-progress: false

jobs:
  retry-launch:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCI CLI and tools
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli
          sudo apt-get update
          sudo apt-get install -y openssl curl jq

      - name: Restore working OCI config and key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.oci

          echo '${{ secrets.OCI_PRIVATE_KEY_B64 }}' | base64 -d > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          echo '${{ secrets.OCI_CONFIG_B64 }}' | base64 -d > ~/.oci/config
          sed -i 's|^key_file=.*|key_file=/home/runner/.oci/oci_api_key.pem|' ~/.oci/config
          chmod 600 ~/.oci/config

          echo "OCI_CLI_CONFIG_FILE=/home/runner/.oci/config" >> "$GITHUB_ENV"

      - name: Verify key matches fingerprint from config
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_FP="$(awk -F= '/^fingerprint=/{print $2}' ~/.oci/config | tr -d '\r\n[:space:]')"
          DERIVED_FP="$(openssl rsa -pubout -outform DER -in ~/.oci/oci_api_key.pem 2>/dev/null | openssl md5 -c | awk '{print $2}')"

          if [ "$DERIVED_FP" != "$CONFIG_FP" ]; then
            echo "Fingerprint mismatch."
            echo "Derived: $DERIVED_FP"
            echo "Config: $CONFIG_FP"
            exit 1
          fi

          echo "Fingerprint matches key."

      - name: Verify OCI auth works
        shell: bash
        run: |
          set -euo pipefail
          oci os ns get
          oci os bucket get -ns axz5kerlx4p6 -bn tf-state

      - name: Retry launch loop for 5h30m
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e

          INSTANCE_NAME="instance-20260309-0046"
          AVAILABILITY_DOMAIN="cHOj:ME-DUBAI-1-AD-1"
          SUBNET_ID="ocid1.subnet.oc1.me-dubai-1.aaaaaaaav6dpwb2wgxvjctydrzbo46jspe6hxc5nnvuxcfal63uu2dgmznda"
          IMAGE_ID="ocid1.image.oc1.me-dubai-1.aaaaaaaab352mbi4vcyymzs4ccln576k34khc357fk2hlaqx3cuzjclgkoea"
          SHAPE="VM.Standard.A1.Flex"
          SHAPE_CONFIG='{"ocpus": 2, "memoryInGBs": 12}'
          SSH_KEYS='{"ssh_authorized_keys":"ssh-rsa  ssh-key-2026-03-08"}'

          COMPARTMENT_ID="$(awk -F= '/^tenancy=/{print $2}' ~/.oci/config | tr -d '\r\n[:space:]')"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TRIGGER="${{ github.event_name }}"
          START_TS="$(date +%s)"
          MAX_SECONDS=19800
          ATTEMPT=0
          SLEEP_SECONDS=300

          send_telegram() {
            local status="$1"
            local details="$2"
            local when_utc
            local msg

            when_utc="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            msg="<b>Oracle Capacity Retry</b>%0A"
            msg="${msg}<b>Status:</b> ${status}%0A"
            msg="${msg}<b>Details:</b> ${details}%0A"
            msg="${msg}<b>Instance:</b> ${INSTANCE_NAME}%0A"
            msg="${msg}<b>Region:</b> me-dubai-1%0A"
            msg="${msg}<b>Trigger:</b> ${TRIGGER}%0A"
            msg="${msg}<b>Run:</b> #${GITHUB_RUN_NUMBER}%0A"
            msg="${msg}<b>Attempt:</b> ${ATTEMPT}%0A"
            msg="${msg}<b>Time:</b> ${when_utc}%0A"
            msg="${msg}<b>Logs:</b> ${RUN_URL}"

            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data "chat_id=${TELEGRAM_CHAT_ID}" \
              --data "text=${msg}" \
              --data "parse_mode=HTML" \
              --data "disable_web_page_preview=true" \
              >/dev/null 2>&1 || true
          }

          is_retryable_log() {
            local file="$1"

            grep -Eqi \
              'Out of host capacity|out of capacity|The connection to endpoint timed out|timed out|ConnectTimeout|ReadTimeout|ConnectionError|connection was closed|Connection reset by peer|Temporary failure in name resolution|Name or service not known|ServiceUnavailable|TooManyRequests|rate limit|InternalServerError|BadGateway|gateway timeout' \
              "$file"
          }

          while true; do
            NOW_TS="$(date +%s)"
            ELAPSED=$((NOW_TS - START_TS))

            if [ "$ELAPSED" -ge "$MAX_SECONDS" ]; then
              ATTEMPT=$((ATTEMPT + 1))
              send_telegram "⏱️ Loop finished" "Reached 5h30m runtime. The next scheduled cycle will start later."
              exit 0
            fi

            ATTEMPT=$((ATTEMPT + 1))

            oci compute instance list \
              --compartment-id "$COMPARTMENT_ID" \
              --availability-domain "$AVAILABILITY_DOMAIN" \
              --display-name "$INSTANCE_NAME" \
              --all \
              --query "data[?\"lifecycle-state\"!='TERMINATED'].id | [0]" \
              --raw-output > instance_check.out 2> instance_check.err

            LIST_CODE=$?

            if [ "$LIST_CODE" -ne 0 ]; then
              if is_retryable_log instance_check.err; then
                ERROR_TEXT="$(tail -n 20 instance_check.err | tr '\n' ' ' | cut -c1-700)"
                send_telegram "🟠 Retryable check error" "${ERROR_TEXT}. Sleeping 5 minutes before retry."
                sleep "$SLEEP_SECONDS"
                continue
              else
                ERROR_TEXT="$(tail -n 20 instance_check.err | tr '\n' ' ' | cut -c1-700)"
                send_telegram "❌ Non-retryable check error" "$ERROR_TEXT"
                exit "$LIST_CODE"
              fi
            fi

            EXISTING_ID="$(cat instance_check.out | tr -d '\r\n')"

            if [ "$EXISTING_ID" != "null" ] && [ -n "$EXISTING_ID" ]; then
              send_telegram "✅ Instance already exists" "$EXISTING_ID"
              exit 0
            fi

            : > launch.log

            oci compute instance launch \
              --availability-domain "$AVAILABILITY_DOMAIN" \
              --compartment-id "$COMPARTMENT_ID" \
              --subnet-id "$SUBNET_ID" \
              --display-name "$INSTANCE_NAME" \
              --shape "$SHAPE" \
              --shape-config "$SHAPE_CONFIG" \
              --image-id "$IMAGE_ID" \
              --assign-public-ip true \
              --assign-private-dns-record true \
              --availability-config '{"recoveryAction":"RESTORE_INSTANCE"}' \
              --instance-options '{"areLegacyImdsEndpointsDisabled": false}' \
              --metadata "$SSH_KEYS" \
              2>&1 | tee launch.log

            LAUNCH_CODE=${PIPESTATUS[0]}

            if [ "$LAUNCH_CODE" -eq 0 ]; then
              NEW_ID="$(grep -o 'ocid1\.instance\.[^" ]*' launch.log | head -n 1)"
              if [ -z "$NEW_ID" ]; then
                NEW_ID="Launch request succeeded."
              fi
              send_telegram "✅ Launch succeeded" "$NEW_ID"
              exit 0
            fi

            if is_retryable_log launch.log; then
              if grep -Eqi 'Out of host capacity|out of capacity' launch.log; then
                send_telegram "🟡 Out of host capacity" "Attempt ${ATTEMPT} failed due to capacity. Sleeping 5 minutes before retry."
              else
                ERROR_TEXT="$(tail -n 20 launch.log | tr '\n' ' ' | cut -c1-700)"
                send_telegram "🟠 Retryable OCI error" "${ERROR_TEXT}. Sleeping 5 minutes before retry."
              fi
              sleep "$SLEEP_SECONDS"
              continue
            fi

            ERROR_TEXT="$(tail -n 20 launch.log | tr '\n' ' ' | cut -c1-700)"
            send_telegram "❌ Non-retryable OCI error" "$ERROR_TEXT"
            exit "$LAUNCH_CODE"
          done
