name: Oracle capacity retry

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: oracle-capacity-retry
  cancel-in-progress: false

jobs:
  retry-launch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCI CLI and OpenSSL
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli
          sudo apt-get update
          sudo apt-get install -y openssl

      - name: Restore working OCI config and key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.oci

          echo '${{ secrets.OCI_PRIVATE_KEY_B64 }}' | base64 -d > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          echo '${{ secrets.OCI_CONFIG_B64 }}' | base64 -d > ~/.oci/config
          sed -i 's|^key_file=.*|key_file=/home/runner/.oci/oci_api_key.pem|' ~/.oci/config
          chmod 600 ~/.oci/config

          echo "OCI_CLI_CONFIG_FILE=/home/runner/.oci/config" >> "$GITHUB_ENV"

      - name: Verify key matches fingerprint from config
        shell: bash
        run: |
          set -euo pipefail
          CONFIG_FP="$(awk -F= '/^fingerprint=/{print $2}' ~/.oci/config | tr -d '\r\n[:space:]')"
          DERIVED_FP="$(openssl rsa -pubout -outform DER -in ~/.oci/oci_api_key.pem 2>/dev/null | openssl md5 -c | awk '{print $2}')"

          if [ "$DERIVED_FP" != "$CONFIG_FP" ]; then
            echo "Fingerprint mismatch."
            echo "Derived: $DERIVED_FP"
            echo "Config: $CONFIG_FP"
            exit 1
          fi

          echo "Fingerprint matches key."

      - name: Verify OCI auth works
        shell: bash
        run: |
          set -euo pipefail
          oci os ns get
          oci os bucket get -ns axz5kerlx4p6 -bn tf-state

      - name: Check if instance already exists
        id: exists
        shell: bash
        run: |
          set -euo pipefail

          COMPARTMENT_ID="$(awk -F= '/^tenancy=/{print $2}' ~/.oci/config | tr -d '\r\n[:space:]')"

          EXISTING_ID="$(oci compute instance list \
            --compartment-id "$COMPARTMENT_ID" \
            --availability-domain "cHOj:ME-DUBAI-1-AD-1" \
            --display-name "instance-20260309-0046" \
            --all \
            --query "data[?\"lifecycle-state\"!='TERMINATED'].id | [0]" \
            --raw-output)"

          if [ "$EXISTING_ID" = "null" ] || [ -z "$EXISTING_ID" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing instance found."
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Existing instance found: $EXISTING_ID"
          fi

      - name: Launch instance
        if: steps.exists.outputs.exists == 'false'
        shell: bash
        run: |
          set +e

          COMPARTMENT_ID="$(awk -F= '/^tenancy=/{print $2}' ~/.oci/config | tr -d '\r\n[:space:]')"

          oci compute instance launch \
            --availability-domain "cHOj:ME-DUBAI-1-AD-1" \
            --compartment-id "$COMPARTMENT_ID" \
            --subnet-id "ocid1.subnet.oc1.me-dubai-1.aaaaaaaav6dpwb2wgxvjctydrzbo46jspe6hxc5nnvuxcfal63uu2dgmznda" \
            --display-name "instance-20260309-0046" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 2, "memoryInGBs": 12}' \
            --image-id "ocid1.image.oc1.me-dubai-1.aaaaaaaab352mbi4vcyymzs4ccln576k34khc357fk2hlaqx3cuzjclgkoea" \
            --assign-public-ip true \
            --assign-private-dns-record true \
            --availability-config '{"recoveryAction":"RESTORE_INSTANCE"}' \
            --instance-options '{"areLegacyImdsEndpointsDisabled": false}' \
            --metadata '{"ssh_authorized_keys":"ssh-rsa  ssh-key-2026-03-08"}' \
            2>&1 | tee launch.log

          code=${PIPESTATUS[0]}

          if [ $code -eq 0 ]; then
            echo "Instance launch request succeeded."
            exit 0
          fi

          if grep -qi "Out of host capacity" launch.log || grep -qi "out of capacity" launch.log; then
            echo "Still out of capacity. Next scheduled run will retry."
            exit 0
          fi

          exit $code
