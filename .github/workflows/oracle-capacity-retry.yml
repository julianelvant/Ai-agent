name: Oracle capacity retry

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: oracle-capacity-retry
  cancel-in-progress: false

jobs:
  retry-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Create OCI config
        shell: bash
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

          chmod 600 ~/.oci/config

      - name: Debug OCI secret presence
        shell: bash
        run: |
          [ -n "$OCI_TENANCY_OCID" ] && echo "TENANCY set" || (echo "TENANCY missing" && exit 1)
          [ -n "$OCI_USER_OCID" ] && echo "USER set" || (echo "USER missing" && exit 1)
          [ -n "$OCI_FINGERPRINT" ] && echo "FINGERPRINT set" || (echo "FINGERPRINT missing" && exit 1)
          [ -n "$OCI_REGION" ] && echo "REGION set" || (echo "REGION missing" && exit 1)
          [ -n "$OCI_PRIVATE_KEY" ] && echo "PRIVATE KEY set" || (echo "PRIVATE KEY missing" && exit 1)
          [ -f ~/.oci/config ] && echo "OCI config created" || (echo "OCI config missing" && exit 1)
          [ -f ~/.oci/oci_api_key.pem ] && echo "OCI key file created" || (echo "OCI key file missing" && exit 1)

      - name: Terraform Init
        run: terraform init -input=false -reconfigure

      - name: Terraform Apply
        shell: bash
        run: |
          set +e
          terraform apply -auto-approve -input=false 2>&1 | tee apply.log
          code=${PIPESTATUS[0]}

          if [ $code -eq 0 ]; then
            echo "Terraform apply succeeded."
            exit 0
          fi

          if grep -q "Out of host capacity" apply.log; then
            echo "Still out of capacity. Next scheduled run will retry."
            exit 0
          fi

          exit $code
