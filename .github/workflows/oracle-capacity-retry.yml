name: Oracle capacity retry

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: oracle-capacity-retry
  cancel-in-progress: false

jobs:
  retry-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Ensure OpenSSL is available
        run: |
          sudo apt-get update
          sudo apt-get install -y openssl

      - name: Create OCI config from secrets
        shell: bash
        run: |
          mkdir -p ~/.oci

          echo '${{ secrets.OCI_PRIVATE_KEY_B64 }}' | base64 -d > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          USER_OCID="$(printf '%s' '${{ secrets.OCI_USER_OCID }}' | tr -d '\r\n')"
          TENANCY_OCID="$(printf '%s' '${{ secrets.OCI_TENANCY_OCID }}' | tr -d '\r\n')"
          FINGERPRINT="$(printf '%s' '${{ secrets.OCI_FINGERPRINT }}' | tr -d '\r\n')"
          REGION="$(printf '%s' '${{ secrets.OCI_REGION }}' | tr -d '\r\n')"

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${USER_OCID}
          fingerprint=${FINGERPRINT}
          tenancy=${TENANCY_OCID}
          region=${REGION}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

          chmod 600 ~/.oci/config

      - name: Verify private key matches fingerprint
        shell: bash
        run: |
          EXPECTED_FP="$(printf '%s' '${{ secrets.OCI_FINGERPRINT }}' | tr -d '\r\n')"
          DERIVED_FP="$(openssl rsa -pubout -outform DER -in ~/.oci/oci_api_key.pem 2>/dev/null | openssl md5 -c | awk '{print $2}')"

          if [ "$DERIVED_FP" != "$EXPECTED_FP" ]; then
            echo "Fingerprint mismatch."
            echo "Derived: $DERIVED_FP"
            echo "Expected: $EXPECTED_FP"
            exit 1
          fi

          echo "Fingerprint matches private key."

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        id: apply
        shell: bash
        run: |
          set +e
          terraform apply -auto-approve -input=false 2>&1 | tee apply.log
          code=${PIPESTATUS[0]}

          if [ $code -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            exit 0
          fi

          if grep -q "Out of host capacity" apply.log; then
            echo "status=capacity" >> $GITHUB_OUTPUT
            echo "Still out of capacity. Next scheduled run will retry."
            exit 0
          fi

          echo "status=failed" >> $GITHUB_OUTPUT
          exit $code

      - name: Commit Terraform state
        if: steps.apply.outputs.status == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add terraform.tfstate terraform.tfstate.backup .terraform.lock.hcl || true

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "Update terraform state after successful OCI apply"
          git push
